<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦄 VIBECRAFT ULTRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="unicorn-wrap" id="unicornEmoji">🦄</div>
        <h1>VIBECRAFT ULTRA</h1>
        <div class="tagline">Series Z • Disrupting disruption • Emotional burn rate: critical</div>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="generator">⚡ Generate</button>
        <button class="tab" data-tab="battle">⚔️ Battle</button>
        <button class="tab" data-tab="roast">🔥 Roast</button>
        <button class="tab" data-tab="pitch">📊 Pitch Deck</button>
        <button class="tab" data-tab="history">📜 History</button>
    </div>

    <div class="panel active" id="panel-generator">
        <div class="name-box">
            <div id="startupName">⚡ press GENERATE</div>
            <div id="valuationBadge" style="margin-top:0.75rem; font-size:0.75rem; color:var(--muted)"></div>
        </div>
        <div class="controls">
            <button class="btn btn-primary" id="generateBtn">🌀 GENERATE</button>
            <button class="btn btn-dark" id="linkedinBtn">💼 LinkedIn</button>
            <button class="btn btn-dark" id="darkModeBtn">🌙 Dark Founder</button>
        </div>
    </div>

    <div class="panel" id="panel-battle"><p class="tagline" style="text-align:center">⚔️ Battle Mode — Coming in v2.0</p></div>
    <div class="panel" id="panel-roast"><p class="tagline" style="text-align:center">🔥 Roast Mode — Coming in v2.0</p></div>
    <div class="panel" id="panel-pitch"><p class="tagline" style="text-align:center">📊 Pitch Deck — Coming in v2.0</p></div>
    <div class="panel" id="panel-history"><p class="tagline" style="text-align:center">📜 History — Coming in v2.0</p></div>

    <div class="footer">🦄 VIBECRAFT ULTRA · Pre-revenue · Pre-product · Pre-idea</div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/generators.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
